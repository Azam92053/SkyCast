<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<style>
:root {
  --bg: linear-gradient(to right, #4facfe, #00f2fe);
  --text: white;
  --card: rgba(255,255,255,0.2);
}

body.dark {
  --bg: linear-gradient(to right, #141e30, #243b55);
  --text: #eee;
  --card: rgba(0,0,0,0.3);
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  text-align: center;
  transition: 0.3s;
}

.container {
  padding: 20px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  margin: 5px;
  cursor: pointer;
  background: #0072ff;
  color: white;
}

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  width: 250px;
  margin: auto;
}

.forecast {
  display: flex;
  justify-content: center;
  margin-top: 20px;
  gap: 10px;
  flex-wrap: wrap;
}

.forecast div {
  background: var(--card);
  padding: 10px;
  border-radius: 10px;
}

.loader {
  border: 5px solid white;
  border-top: 5px solid transparent;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  margin: 20px auto;
  animation: spin 1s linear infinite;
}

.hidden {
  display: none;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
  <h1>🌦️ Weather App</h1>

  <button onclick="toggleTheme()" id="themeToggle">🌙 Dark Mode</button>

  <div>
    <input type="text" id="cityInput" placeholder="Enter city...">
    <button onclick="getWeather()">Search</button>
    <button onclick="getLocationWeather()">📍</button>
  </div>

  <div id="loader" class="loader hidden"></div>

  <div id="weatherCard" class="card hidden">
    <h2 id="cityName"></h2>
    <img id="weatherIcon" />
    <p id="temperature"></p>
    <p id="condition"></p>
    <p id="humidity"></p>
  </div>

  <div id="forecast" class="forecast"></div>
</div>

<script>
const apiKey = "YOUR_API_KEY"; // 🔴 put your openweather api key here
const cache = {};

// 🌙 Theme toggle
function toggleTheme() {
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  document.getElementById("themeToggle").innerText =
    isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
}

// Load saved theme
(function () {
  const saved = localStorage.getItem("theme");
  if (saved === "dark") {
    document.body.classList.add("dark");
    document.getElementById("themeToggle").innerText = "☀️ Light Mode";
  }
})();

// Loader
function showLoader(show) {
  document.getElementById("loader").classList.toggle("hidden", !show);
}

// Search by city
function getWeather() {
  const city = document.getElementById("cityInput").value;
  if (!city) return alert("Enter city");
  fetchWeather(`q=${city}`);
}

// 📍 Location weather
function getLocationWeather() {
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude, longitude } = pos.coords;
    fetchWeather(`lat=${latitude}&lon=${longitude}`);
  });
}

// 🚀 Fetch weather (optimized)
async function fetchWeather(query) {
  if (cache[query]) {
    displayWeather(cache[query].current);
    displayForecast(cache[query].forecast);
    return;
  }

  showLoader(true);

  try {
    const currentRes = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?${query}&appid=${apiKey}&units=metric`
    );
    const currentData = await currentRes.json();
    displayWeather(currentData);

    const forecastRes = await fetch(
      `https://api.openweathermap.org/data/2.5/forecast?${query}&appid=${apiKey}&units=metric`
    );
    const forecastData = await forecastRes.json();
    displayForecast(forecastData);

    cache[query] = {
      current: currentData,
      forecast: forecastData
    };

  } catch {
    alert("Error fetching data");
  }

  showLoader(false);
}

// Display current weather
function displayWeather(data) {
  document.getElementById("weatherCard").classList.remove("hidden");

  document.getElementById("cityName").innerText = data.name;
  document.getElementById("temperature").innerText = `${data.main.temp} °C`;
  document.getElementById("condition").innerText = data.weather[0].description;
  document.getElementById("humidity").innerText = `Humidity: ${data.main.humidity}%`;

  document.getElementById("weatherIcon").src =
    `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
}

// Display forecast
function displayForecast(data) {
  const forecastDiv = document.getElementById("forecast");
  forecastDiv.innerHTML = "";

  const daily = data.list.filter(i => i.dt_txt.includes("12:00:00"));

  daily.slice(0, 5).forEach(day => {
    const div = document.createElement("div");

    div.innerHTML = `
      <p>${new Date(day.dt_txt).toLocaleDateString()}</p>
      <img src="https://openweathermap.org/img/wn/${day.weather[0].icon}.png"/>
      <p>${day.main.temp}°C</p>
    `;

    forecastDiv.appendChild(div);
  });
}
</script>

</body>
</html>
